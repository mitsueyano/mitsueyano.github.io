<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatec Portas Fechadas</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Average+Sans&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Merienda:wght@300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@glidejs/glide@3.7.1/dist/css/glide.theme.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@glidejs/glide@3.7.1/dist/css/glide.core.min.css">
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
</head>
<body>
    <header>
        <a href="../../index.html#projects" class="logo">Luiza Mitsue Yano</a>
        <nav>
        <button id="mobileToggle" aria-label="Abrir menu">
            <i class="fa-solid fa-bars icon-bars"></i>
            <i class="fa-solid fa-xmark icon-close"></i>
        </button>
        <div id="desktopToggle">
            <ul id="listDesktop">
                    
            </ul>
        </div>
        <ul id="listMobile">  

        </ul>
        </nav>
    </header>

    <section id="about">
        <div class="text">
            <h1 id="projectTitle"></h1>
            <p id="projectDescription"></p>
        </div>
        <div class="glide">
            <div class="fade"></div>
            <div class="glide__track" data-glide-el="track">
                <ul class="glide__slides">
                    
                </ul>   
            </div>
            <div class="glide__arrows" data-glide-el="controls">
                <button class="glide__arrow glide__arrow--left" data-glide-dir="<"><i class="fa-solid fa-caret-left"></i></button>
                <button class="glide__arrow glide__arrow--right" data-glide-dir=">"><i class="fa-solid fa-caret-right"></i></button>
            </div>
            <div class="glide__bullets" data-glide-el="controls[nav]">

            </div>
        </div>
    </section>

    <section id="technologies">
        <h2>Tecnologias Utilizadas</h2>
        <div id="projectTechnologies">
        </div>
    </section>

    <footer>
        <p>© <span id="year"></span> Luiza Mitsue Yano</p>
    </footer>

    <script src="../../common.js"></script>
    <script src="./script.js"></script>
    <script src="https://unpkg.com/@glidejs/glide@3.7.1/dist/glide.js"></script>
    <script src="https://kit.fontawesome.com/46985895a5.js" crossorigin="anonymous"></script>
</body>
</html>
